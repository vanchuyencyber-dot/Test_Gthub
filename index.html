<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Automation Dashboard - 4 Tools in 1</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #E0E0E0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Cột Menu bên trái */
        .sidebar { width: 260px; background-color: #1E1E1E; border-right: 1px solid #2D2D2D; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; font-size: 16px; font-weight: bold; color: #00FFCC; background-color: #161616; border-bottom: 1px solid #2D2D2D; text-align: center; }
        
        .tab-btn { padding: 15px 20px; text-align: left; background: none; border: none; color: #AAAAAA; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; border-left: 4px solid transparent; }
        .tab-btn:hover { background-color: #252525; color: #FFFFFF; }
        .tab-btn.active { background-color: #2A2A2A; color: #00FFCC; border-left-color: #00FFCC; }

        /* Vùng hiển thị nội dung Tab chính bên phải */
        .content-area { flex: 1; background-color: #121212; position: relative; }
        .tab-frame { width: 100%; height: 100%; border: none; display: none; }
        .tab-frame.active { display: block; }
    </style>
</head>
<body>

    <!-- Thanh Menu Trái -->
    <div class="sidebar">
        <div class="sidebar-header">🚀 CONTROL PANEL</div>
        <button class="tab-btn active" onclick="switchTab(0, 'tool1.html')">1. Facebook Automation</button>
        <button class="tab-btn" onclick="switchTab(1, 'tool2.html')">2. Affiliate & Drive Auto</button>
        <button class="tab-btn" onclick="switchTab(2, 'tool3.html')">3. Multi Down & AI Voice</button>
        <button class="tab-btn" onclick="switchTab(3, 'tool4.html')">4. CapCut Video Editor</button>
    </div>

    <!-- Khung chứa các file HTML độc lập -->
    <div class="content-area">
        <iframe id="frame0" class="tab-frame active" src="tool1.html"></iframe>
        <iframe id="frame1" class="tab-frame" src="tool2.html"></iframe>
        <iframe id="frame2" class="tab-frame" src="tool3.html"></iframe>
        <iframe id="frame3" class="tab-frame" src="tool4.html"></iframe>
    </div>

    <script>
        function switchTab(index, filename) {
            // Chuyển đổi trạng thái nút bấm Menu
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach((btn, idx) => {
                if (idx === index) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            // Chuyển đổi hiển thị các Iframe tương ứng
            const frames = document.querySelectorAll('.tab-frame');
            frames.forEach((frame, idx) => {
                if (idx === index) {
                    frame.classList.add('active');
                    // Tự động load lại file nếu cần refresh data mới
                    if(!frame.src.endsWith(filename)) frame.src = filename;
                } else {
                    frame.classList.remove('active');
                }
            });
        }
    </script>
</body>
</html>
