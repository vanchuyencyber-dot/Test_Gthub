<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Automation Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; }
        .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin-top: 0; color: #1877f2; }
        label { font-weight: bold; display: block; margin-top: 10px; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        .btn-start { background-color: #2ecc71; }
        .btn-stop { background-color: #e74c3c; }
        .btn-schedule { background-color: #f39c12; }
        
        /* Màn hình Log Console đen chữ xanh */
        .console-box { background-color: #1e1e1e; color: #00ff00; height: 200px; overflow-y: auto; padding: 10px; font-family: monospace; border-radius: 5px; font-size: 13px; line-height: 1.5; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🚀 Trạm Điều Khiển 24/7</h2>
        
        <label>Chọn Tài Khoản (Dữ liệu từ Sheet):</label>
        <select id="accountList">
            <option value="Bé mủm mỉm">Bé mủm mỉm</option>
            <option value="Cá Cắn Câu">Cá Cắn Câu</option>
        </select>

        <label>Nội dung Spin:</label>
        <textarea id="content" rows="3">[Tuyệt vời|Quá hay] [Icon] bài viết rất hữu ích!</textarea>

        <label>Hẹn giờ chạy (Bỏ trống nếu muốn chạy ngay):</label>
        <input type="datetime-local" id="scheduleTime">

        <div class="btn-group">
            <button class="btn-start" onclick="sendCommand('start')">▶ CHẠY NGAY</button>
            <button class="btn-schedule" onclick="sendCommand('schedule')">⏰ HẸN GIỜ</button>
            <button class="btn-stop" onclick="sendCommand('stop')">🛑 DỪNG LẠI</button>
        </div>
    </div>

    <div class="card">
        <h2>📟 Trạng Thái Hệ Thống</h2>
        <div class="console-box" id="logConsole">
            Đang chờ kết nối với VPS...
        </div>
    </div>

    <script>
        // Sửa lại bằng link Ngrok của bạn
        const API_URL = 'https://YOUR_NGROK_LINK.ngrok-free.app/api';

        function sendCommand(action) {
            const payload = {
                action: action,
                account: document.getElementById('accountList').value,
                content: document.getElementById('content').value,
                schedule_time: document.getElementById('scheduleTime').value
            };

            fetch(`${API_URL}/control`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => alert('Lệnh đã được gửi: ' + data.message))
            .catch(err => alert('Lỗi kết nối đến VPS!'));
        }

        // Tự động kéo Log từ VPS về mỗi 3 giây
        setInterval(() => {
            fetch(`${API_URL}/logs`)
            .then(res => res.text())
            .then(logs => {
                const consoleBox = document.getElementById('logConsole');
                consoleBox.innerHTML = logs.replace(/\n/g, '<br>');
                consoleBox.scrollTop = consoleBox.scrollHeight; // Tự động cuộn xuống dưới cùng
            });
        }, 3000);
    </script>
</body>
</html>
