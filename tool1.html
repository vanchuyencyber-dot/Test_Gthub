<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool 1 - Group Automation</title>
    <style>
        /* CSS Reset & Cơ bản (Giao diện Dark Theme) */
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #1a1a1a; margin: 0; padding: 10px; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
        
        /* Tiêu đề & Cụm Tabs */
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #252525; padding: 10px; border-radius: 6px; border: 1px solid #333; }
        .header-title { font-size: 16px; font-weight: bold; color: #00FFCC; margin: 0; display: flex; align-items: center; gap: 8px; }
        .menu-icon { font-size: 20px; cursor: pointer; color: white; }

        /* Khung chọn tài khoản */
        .account-selector { display: flex; align-items: center; background: #252525; padding: 15px; border-radius: 6px; border: 1px solid #333; margin-bottom: 15px; font-weight: bold; font-size: 14px; }
        .account-selector select { margin-left: 10px; flex: 1; padding: 10px; background-color: #1a1a1a; color: white; border: 1px solid #444; border-radius: 4px; outline: none; font-size: 14px; }

        /* Bố cục chính */
        .main-content { display: flex; flex-direction: column; gap: 15px; flex: 1; overflow-y: auto; }

        /* Cột Cấu hình & Nội dung */
        .config-card { background: #252525; padding: 15px; border-radius: 6px; border: 1px solid #333; display: flex; flex-direction: column; gap: 12px; }
        .config-card label { font-weight: bold; font-size: 13px; color: #aaa; }
        .text-content { height: 80px; resize: none; background-color: #1a1a1a; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 10px; font-size: 14px; width: 100%; outline: none; }
        
        .media-row { display: flex; align-items: center; gap: 10px; }
        .btn-attach { background-color: #444; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 13px; font-weight: bold; }
        .btn-clear { background-color: #e74c3c; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        
        .config-row { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: bold; }
        .config-row input[type="number"] { width: 60px; text-align: center; padding: 6px; background: #1a1a1a; border: 1px solid #444; color: white; border-radius: 4px; outline: none; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #3b82f6; }
        
        .timer-text { color: #e74c3c; font-weight: bold; margin-left: auto; font-size: 13px; }

        .action-buttons { display: flex; gap: 15px; margin-top: 5px; }
        .btn-start { flex: 1; background-color: #2ecc71; color: white; border: none; padding: 12px; font-weight: bold; font-size: 15px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-start:hover { background-color: #27ae60; }
        .btn-stop { flex: 1; background-color: #e74c3c; color: white; border: none; padding: 12px; font-weight: bold; font-size: 15px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-stop:hover { background-color: #c0392b; }

        /* Khung Cửa sổ Log */
        .log-card { background: #252525; padding: 15px; border-radius: 6px; border: 1px solid #333; display: flex; flex-direction: column; }
        .log-card label { font-weight: bold; font-size: 14px; margin-bottom: 10px; display: block; color: #fff; }
        .global-log { flex: 1; height: 150px; border: 1px solid #000; background-color: #000; color: #00ff00; padding: 10px; font-size: 12px; font-family: monospace; resize: none; outline: none; border-radius: 4px; overflow-y: auto; }

        /* Nút ẩn hiện Danh sách nhóm (Mobile UX) */
        .btn-scan { background-color: #3b82f6; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .group-list { background: #1a1a1a; border: 1px solid #444; border-radius: 4px; padding: 10px; margin-top: 10px; max-height: 200px; overflow-y: auto; display: none; }
        .group-list.active { display: block; }
        
        /* Tùy chỉnh thanh cuộn */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 class="header-title">🚀 CONTROL PANEL</h1>
        <div class="menu-icon">☰</div>
    </div>

    <!-- Khung chọn tài khoản -->
    <div class="account-selector">
        Tài khoản: 
        <select id="acc-select">
            <option>Đang tải tài khoản...</option>
        </select>
    </div>

    <div class="main-content">
        <!-- CẤU HÌNH & THỰC THI -->
        <div class="config-card">
            <label>Nội dung Spin [a|b]:</label>
            <textarea class="text-content" id="txt-content">[ Xin chào | Chào mọi người ] [ Icon ]&#10;Nội dung có bộ random</textarea>
            
            <div class="media-row">
                <button class="btn-attach">📸 Đính kèm Ảnh/Video</button>
                <button class="btn-clear">X</button>
                <span style="color: gray; font-size: 12px;" id="lbl-media">Chưa chọn file...</span>
            </div>

            <div class="config-row" style="margin-top: 5px;">
                <input type="checkbox" id="chk-comment"> <label for="chk-comment" style="color: white; margin-right: 10px;">Comments dạo</label>
                <span style="font-size: 13px; color: #aaa;">Số bài:</span>
                <input type="number" id="num-cmt" value="5">
            </div>

            <div class="config-row">
                <input type="checkbox" id="chk-post" checked> <label for="chk-post" style="color: white;">Post bài vào nhóm</label>
            </div>

            <div class="config-row" style="margin-top: 5px;">
                <span style="font-size: 13px; color: #aaa;">Delay (giây):</span>
                <input type="number" id="delay-min" value="250"> - <input type="number" id="delay-max" value="300">
                <span class="timer-text" id="lbl-timer">Timer: --:--</span>
            </div>

            <div class="action-buttons">
                <button class="btn-start" onclick="triggerStart()">THỰC THI</button>
                <button class="btn-stop" onclick="triggerStop()">DỪNG</button>
            </div>
            
            <button class="btn-scan" onclick="triggerScan()">🔍 QUÉT DANH SÁCH NHÓM</button>
            <div class="group-list" id="group-list">
                <div style="color: #aaa; text-align: center; font-size: 12px;">Bấm Quét để lấy danh sách...</div>
            </div>
        </div>

        <!-- CỬA SỔ LOG VPS -->
        <div class="log-card">
            <label>Cửa sổ Log (VPS Console)</label>
            <textarea class="global-log" id="txt-global-status" readonly>[Hệ thống] Đang khởi động...</textarea>
        </div>
    </div>

    <!-- JAVASCRIPT GIAO TIẾP VỚI VPS -->
    <script>
        // BẠN ĐIỀN CHÍNH XÁC LINK NGROK ĐANG CHẠY CỦA BẠN VÀO ĐÂY (NHỚ CÓ CHỮ /api Ở CUỐI)
        const API_URL = "https://divisive-dingbat-ion.ngrok-free.dev/api"; 

        const logBox = document.getElementById('txt-global-status');
        function writeLog(msg) {
            const timeStr = new Date().toLocaleTimeString('vi-VN', {hour12: false});
            logBox.value += `\n[${timeStr}] ${msg}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // 1. TỰ ĐỘNG LẤY DANH SÁCH TÀI KHOẢN KHI MỞ TRANG
        window.onload = function() {
            writeLog("Đang kết nối tới máy chủ VPS...");
            
            fetch(`${API_URL}/accounts`, {
                method: 'GET',
                headers: {
                    'ngrok-skip-browser-warning': 'true' // THẺ VIP XUYÊN TƯỜNG NGROK
                }
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    const select = document.getElementById('acc-select');
                    select.innerHTML = ''; 
                    data.accounts.forEach(acc => {
                        select.innerHTML += `<option value="${acc}">${acc}</option>`;
                    });
                    writeLog("✅ Quét thành công danh sách từ Google Sheets!");
                } else {
                    writeLog(`❌ Lỗi VPS: ${data.message}`);
                }
            })
            .catch(err => writeLog(`❌ Không thể kết nối tới VPS: ${err.message}`));
        };

        // 2. NÚT QUÉT NHÓM
        function triggerScan() {
            const acc = document.getElementById('acc-select').value;
            if(!acc || acc.includes("Đang tải")) {
                alert("Vui lòng đợi tải xong tài khoản!");
                return;
            }

            const groupList = document.getElementById('group-list');
            groupList.classList.add('active'); // Hiện khung danh sách
            groupList.innerHTML = '<div style="color: #aaa; text-align: center;">Đang yêu cầu VPS quét nhóm...</div>';
            writeLog(`Bắt đầu cào danh sách nhóm cho [ ${acc} ]...`);

            fetch(`${API_URL}/scan-groups`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true' // THẺ VIP XUYÊN TƯỜNG NGROK
                },
                body: JSON.stringify({ account: acc })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    groupList.innerHTML = '';
                    data.groups.forEach((group, index) => {
                        groupList.innerHTML += `
                            <div style="margin-bottom: 8px; display: flex; align-items: center;">
                                <input type="checkbox" id="gr-${index}" value="${group.url}" checked>
                                <label for="gr-${index}" style="margin-left: 8px; font-size: 13px; color: white;">${group.name}</label>
                            </div>
                        `;
                    });
                    writeLog(`✅ Đã quét xong ${data.groups.length} nhóm!`);
                } else {
                    writeLog(`❌ Lỗi quét: ${data.message}`);
                    groupList.innerHTML = `<div style="color: #e74c3c;">Lỗi: ${data.message}</div>`;
                }
            })
            .catch(err => writeLog(`❌ Mất kết nối khi quét: ${err.message}`));
        }

        // 3. NÚT THỰC THI (ĐẨY TASK LÊN VPS)
        function triggerStart() {
            const acc = document.getElementById('acc-select').value;
            writeLog(`Đã gửi lệnh chạy cho [ ${acc} ] lên Hàng đợi VPS!`);
            writeLog(`Đang mô phỏng thao tác lướt feed chống ban...`);
        }

        // 4. NÚT DỪNG
        function triggerStop() {
            writeLog(`⚠️ Đã gửi lệnh DỪNG KHẨN CẤP tới VPS!`);
        }
    </script>
</body>
</html>
