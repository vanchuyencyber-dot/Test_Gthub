<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tool 1 - Control Panel</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background-color: #1a1a1a; color: #e0e0e0; display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }
        
        .header { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: bold; font-size: 18px; color: #00FFCC; }
        .header .menu { color: #fff; font-size: 24px; cursor: pointer; }

        .control-panel { background-color: #252525; border-radius: 10px; padding: 20px; width: 100%; max-width: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); margin-bottom: 20px; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; font-size: 14px; margin-bottom: 10px; color: #ccc; }
        
        select, textarea, input[type="number"] { width: 100%; background-color: #151515; color: #fff; border: 1px solid #444; border-radius: 6px; padding: 12px; outline: none; font-size: 14px; }
        textarea { height: 100px; resize: none; margin-bottom: 15px; }
        
        .media-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .btn-attach { background-color: #3b3b3b; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .btn-x { background-color: #e74c3c; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .file-status { color: #777; font-size: 13px; }

        .inline-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-size: 14px; color: #fff; font-weight: bold;}
        .inline-row input[type="checkbox"] { width: 22px; height: 22px; accent-color: #3b82f6; }
        .inline-row input[type="number"] { width: 70px; text-align: center; padding: 8px; }

        .delay-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-size: 14px; color: #ccc; }
        .delay-row input { width: 60px; text-align: center; }

        .timer-text { text-align: right; color: #e74c3c; font-weight: bold; margin-bottom: 20px; font-size: 14px; }

        .action-btns { display: flex; gap: 10px; }
        .btn-green, .btn-red, .btn-blue { flex: 1; border: none; padding: 15px; border-radius: 6px; font-weight: bold; font-size: 16px; color: white; cursor: pointer; }
        .btn-green { background-color: #2ecc71; }
        .btn-red { background-color: #e74c3c; }
        .btn-blue { background-color: #3b82f6; margin-bottom: 15px; width: 100%;}

        .log-panel { background-color: #252525; border-radius: 10px; padding: 20px; width: 100%; max-width: 500px; }
        .log-panel label { display: block; font-weight: bold; font-size: 15px; margin-bottom: 10px; color: #fff; }
        .status-box { width: 100%; height: 180px; background-color: #0d0d0d; color: #00ff00; border: 1px solid #444; border-radius: 6px; padding: 12px; font-family: monospace; font-size: 12px; resize: none; outline: none; }

        /* Vùng nhóm (Bổ sung ẩn/hiện) */
        .group-container { display: none; background: #151515; border: 1px solid #444; border-radius: 6px; padding: 10px; height: 150px; overflow-y: auto; margin-bottom: 15px; }
        .group-item { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; color: #ccc; font-size: 13px;}
    </style>
</head>
<body>

    <div class="header">
        <div>🚀 CONTROL PANEL</div>
        <div class="menu">≡</div>
    </div>

    <div class="control-panel">
        
        <div class="form-group">
            <label>Tài khoản chạy:</label>
            <select id="acc-select"><option>Đang tải...</option></select>
        </div>

        <button class="btn-blue" onclick="triggerScan()">🔄 QUÉT NHÓM TỪ TÀI KHOẢN</button>
        <div class="group-container" id="group-list"></div>

        <div class="form-group">
            <label>Nội dung Spin [a|b]:</label>
            <textarea id="txt-content">[ Xin chào | Chào mọi người ] [ Icon ]&#10;Nội dung có bộ random</textarea>
        </div>
        
        <div class="media-row">
            <button class="btn-attach">📸 Đính kèm Ảnh/Video</button>
            <button class="btn-x">X</button>
            <span class="file-status">Chưa chọn file...</span>
        </div>

        <div class="inline-row">
            <input type="checkbox" id="chk-comment"> 
            <label for="chk-comment" style="margin:0;">Comments dạo</label>
            <span style="margin-left:auto;">Số bài:</span>
            <input type="number" id="num-cmt" value="5">
        </div>

        <div class="inline-row">
            <input type="checkbox" id="chk-post" checked> 
            <label for="chk-post" style="margin:0;">Post bài vào nhóm</label>
        </div>

        <div class="delay-row">
            Delay (giây): 
            <input type="number" id="delay-min" value="250"> - <input type="number" id="delay-max" value="300">
        </div>

        <div class="timer-text">Timer: --:--</div>

        <div class="action-btns">
            <button class="btn-green" onclick="triggerStart()">THỰC THI</button>
            <button class="btn-red">DỪNG</button>
        </div>

    </div>

    <div class="log-panel">
        <label>Cửa sổ Log (VPS Console)</label>
        <textarea class="status-box" id="txt-global-status" readonly>[Hệ thống] Đang kết nối tới máy chủ VPS...</textarea>
    </div>

    <script>
        // --- THAY LINK NGROK VÀO ĐÂY ---
        const API_URL = "https://YOUR_NGROK_LINK.ngrok-free.dev/api";
        const fetchHeaders = { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' };

        window.onload = function() {
            fetch(`${API_URL}/accounts`, { headers: { 'ngrok-skip-browser-warning': 'true' } })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    const select = document.getElementById('acc-select');
                    select.innerHTML = ''; 
                    data.accounts.forEach(acc => {
                        select.innerHTML += `<option value="${acc}">${acc}</option>`;
                    });
                    writeLog("✅ Load Session Facebook thành công.");
                }
            })
            .catch(err => writeLog("❌ Lỗi API Load Session."));
            
            setInterval(pollLogs, 2000);
        };

        function pollLogs() {
            fetch(`${API_URL}/logs`, { headers: { 'ngrok-skip-browser-warning': 'true' } })
            .then(res => res.text())
            .then(logs => {
                const logBox = document.getElementById('txt-global-status');
                if (logBox.value !== logs && logs.trim() !== "") {
                    logBox.value = logs;
                    logBox.scrollTop = logBox.scrollHeight;
                }
            }).catch(()=>{});
        }

        function writeLog(msg) {
            const logBox = document.getElementById('txt-global-status');
            const time = new Date().toLocaleTimeString();
            logBox.value += `\n[${time}] ${msg}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function triggerScan() {
            const acc = document.getElementById('acc-select').value;
            writeLog(`Đang cào danh sách nhóm cho ${acc}...`);
            const grpBox = document.getElementById('group-list');
            grpBox.style.display = "block";
            grpBox.innerHTML = '<div style="color: #00FFCC; text-align: center; margin-top: 50px;">Đang quét tự động (30s)...</div>';
            
            fetch(`${API_URL}/scan-groups`, {
                method: 'POST',
                headers: fetchHeaders,
                body: JSON.stringify({ account: acc })
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    grpBox.innerHTML = ''; 
                    data.groups.forEach((g, i) => {
                        grpBox.innerHTML += `
                            <div class="group-item">
                                <input type="checkbox" id="g${i}" value="${g.url}" checked>
                                <label for="g${i}">${g.name}</label>
                            </div>
                        `;
                    });
                }
            }).catch(err => writeLog("❌ Lỗi API quét nhóm."));
        }

        function triggerStart() {
            const selectedGroups = [];
            document.querySelectorAll('.group-item input:checked').forEach(cb => {
                selectedGroups.push({ url: cb.value, name: cb.nextElementSibling.innerText });
            });

            const payload = {
                tool_id: "tool1", // KHAI BÁO ĐỊNH TUYẾN MICROSERVICE TỚI FOLDER CỦA TOOL NÀY
                account: document.getElementById('acc-select').value,
                groups: selectedGroups,
                content: document.getElementById('txt-content').value,
                num_cmt: parseInt(document.getElementById('num-cmt').value),
                delay_min: parseInt(document.getElementById('delay-min').value),
                delay_max: parseInt(document.getElementById('delay-max').value),
            };

            fetch(`${API_URL}/start-task`, {
                method: 'POST',
                headers: fetchHeaders,
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => writeLog(`🔥 ${data.message}`))
            .catch(err => writeLog(`❌ Lỗi gửi lệnh: ${err}`));
        }
    </script>
</body>
</html>
