<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tool 2 - Affiliate & Drive Auto</title>
    <style>
        body { background-color: #121212; color: #E0E0E0; font-family: 'Segoe UI', Arial; padding: 20px; }
        h2 { color: #FF9800; margin-bottom: 15px; }
        .card { background: #1E1E1E; padding: 15px; border-radius: 8px; border: 1px solid #2D2D2D; margin-bottom: 15px; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 13px; }
        select { width: 100%; padding: 8px; margin-top: 5px; background: #252525; border: 1px solid #3A3A3A; color: white; border-radius: 4px; }
        .btn-warning { background: #FF9800; color: black; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-warning:hover { background: #e68a00; }
        .log-box { background: #000; color: #FFD700; font-family: monospace; height: 120px; overflow-y: auto; padding: 10px; border-radius: 4px; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>🤖 Tool 2: GDrive Folder -> Gemini AI Script -> Shopee Link</h2>

    <div class="card" style="background-color: #252210;">
        <label>Chọn Thư Mục Google Drive (Quét video đầu vào):</label>
        <select id="folderSelect">
            <option value="Cook">Thư mục gốc: Cook</option>
            <option value="GiaDungThongMinh">Gia Dụng Thông Minh</option>
        </select>

        <button class="btn-warning" onclick="runTool2()">QUÉT VIDEO & TẠO CONTENT AI</button>
    </div>

    <div class="card">
        <label>Trạng Thái Tiến Trình AI & Shopee:</label>
        <div class="log-box" id="logT2">[Tool 2: Sẵn sàng kết nối Google Sheets & API...]</div>
    </div>

    <script>
        function runTool2() {
            const folder = document.getElementById('folderSelect').value;
            const logBox = document.getElementById('logT2');
            logBox.innerHTML += `<br>[${new Date().toLocaleTimeString()}] Đang quét thư mục ${folder} trên Drive và gọi Gemini Web...`;
            logBox.scrollTop = logBox.scrollHeight;
        }
    </script>
</body>
</html>
